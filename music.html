<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        #nav{
            height: 75px;
            background-color: gold;
            display: flex;
            justify-content: space-between;
            align-items: center;    
        }
        #logoblock>a:hover{
            color: palevioletred;
        }
        #menublock,#logoblock{
            height: 72px;
            width: 200px;
            display: flex;
            justify-content: space-evenly;
            align-items: center;
        }
        #menublock,#logoblock{
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-weight: bolder;
            mix-blend-mode: multiply;
        }
        #logoblock>a{
            text-decoration:none;
            color: black;
        }
        #Photosection{
            height: 600px;
            background-color:#EAEFEF;
            display: flex;
            justify-content: space-evenly;
            align-items: center;
        }
        #child1,#child2{
            height: 375px;
            width: 375px;
            display: flex;
            justify-content: space-evenly;
            align-items: center;
            mix-blend-mode: multiply;
            box-shadow: 0px 0px 5px grey;
            border-radius: 5%;
        }
    </style>
</head>
<body>
    <nav>
        <div id="nav">
        <div id="menublock"><img src="https://thumbs.dreamstime.com/b/apple-music-logo-editorial-illustrative-white-background-logo-icon-vector-logos-icons-set-social-media-flat-banner-vectors-svg-210442263.jpg" alt="" height="160px" width="250px"></div>
        <div id="logoblock" style="width:400px;">
            <a href="">HOME</a>
            <a href="">ABOUT</a>
            <a href="">CONTACT</a>
            <a href="">PROFILE</a>
        </div>
        </div>
    </nav><br>
    <div id="Photosection">
        <div id="child1"><img src="./AirPods-removebg-preview.png" alt="" height="365" width="375"></div>
        <div id="child2"><img src="./OIP - Copy.jpg" alt="" height="365" width="362"></div>
    </div>
</body>
</html>
