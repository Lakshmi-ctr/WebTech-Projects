<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
       h2:first-child{
        color: blue;
       }

       h2:nth-child(3){
        color: burlywood;
       }
     
       h2:last-child{
        color: bisque;
       }
       
       h2:first-of-type{
        color: red;
       }
       a:link{
            color: brown;
        }
        a:visited{
            color: greenyellow;
        }
        a:active{
            color: hotpink;
        }
        a:hover{
            cursor: pointer;;
        }
     
    </style>
</head>
<body>
    <h1>Dynamic Pseudo class selector</h1>
    <a href="https://www.bmw.in/en/index.html" target="_blank">BMW</a> <br><br>
    <h1>Structural Pseudo class selector</h1>
    <div>
    <h2>heading1</h2>
    <h2>heading2</h2>
    <h2>heading3</h2>
    <h2>heading4</h2>
    <h2>heading5</h2>
    </div>
    <h2>Heading6</h2>
</body>
</html>
